{% extends 'Home/base.html' %}
{% load static %}
{% block body %}
<div class="page-wrapper">
   <div class="content container-fluid">
      <div class="page-header">
         <div class="row align-items-center">
            <div class="col">
               <h3 class="page-title">Add Student</h3>
               <ul class="breadcrumb">
                  <li class="breadcrumb-item"><a href="{% url 'student_list' %}">Students</a></li>
                  <li class="breadcrumb-item active">Add Student</li>
               </ul>
            </div>
         </div>
      </div>
      <div class="row">
         <div class="col-sm-12">
            <div class="card">
               <div class="card-body">
                  <form method="POST" enctype="multipart/form-data">
                     {% csrf_token %}
                     <div class="row">
                        <div class="col-12">
                           <h5 class="form-title"><span>Student Information</span></h5>
                           <p class="text-muted small"><span class="text-danger">*</span> Champs obligatoires</p>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>First Name <span class="text-danger">*</span></label>
                              <input type="text" class="form-control" name="first_name" required>
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Last Name <span class="text-danger">*</span></label>
                              <input type="text" class="form-control" name="last_name" required>
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Classe <span class="text-danger">*</span></label>
                              <select class="form-control" name="classe" required>
                                 <option value="">Sélectionner une classe</option>
                                 {% for cls in classes %}
                                 <option value="{{ cls.pk }}">{{ cls.name }}{% if cls.level %} ({{ cls.level }}){% endif %}</option>
                                 {% endfor %}
                              </select>
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Gender <span class="text-danger">*</span></label>
                              <select class="form-control" name="gender" required>
                                 <option value="">Select Gender</option>
                                 <option value="Female">Female</option>
                                 <option value="Male">Male</option>
                              </select>
                           </div>
                        </div>

                        <!-- Optional fields -->
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Student ID <small class="text-muted">(auto-généré si vide)</small></label>
                              <input type="text" class="form-control" name="student_id">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Email <small class="text-muted">(pour accès login — mot de passe = Student ID)</small></label>
                              <input type="email" class="form-control" name="email" placeholder="etudiant@exemple.com">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Date of Birth</label>
                              <input type="date" class="form-control" name="date_of_birth">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Joining Date</label>
                              <input type="date" class="form-control" name="joining_date">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Mobile Number</label>
                              <input type="text" class="form-control" name="mobile_number">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Admission Number</label>
                              <input type="text" class="form-control" name="admission_number">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Section</label>
                              <input type="text" class="form-control" name="section">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Student Image</label>
                              <input type="file" class="form-control" name="student_image">
                           </div>
                        </div>

                        <!-- Parent Info (all optional) -->
                        <div class="col-12 mt-2">
                           <h5 class="form-title"><span>Parent Information <small class="text-muted font-weight-normal">(optionnel)</small></span></h5>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Father's Name</label>
                              <input type="text" class="form-control" name="father_name">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Father's Occupation</label>
                              <input type="text" class="form-control" name="father_occupation">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Father's Mobile</label>
                              <input type="text" class="form-control" name="father_mobile">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Father's Email</label>
                              <input type="email" class="form-control" name="father_email">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Mother's Name</label>
                              <input type="text" class="form-control" name="mother_name">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Mother's Occupation</label>
                              <input type="text" class="form-control" name="mother_occupation">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Mother's Mobile</label>
                              <input type="text" class="form-control" name="mother_mobile">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Mother's Email</label>
                              <input type="email" class="form-control" name="mother_email">
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Present Address</label>
                              <textarea class="form-control" name="present_address"></textarea>
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Permanent Address</label>
                              <textarea class="form-control" name="permanent_address"></textarea>
                           </div>
                        </div>

                        <div class="col-12">
                           <a href="{% url 'student_list' %}" class="btn btn-secondary mr-2">Cancel</a>
                           <button type="submit" class="btn btn-primary">Submit</button>
                        </div>
                     </div>
                  </form>
               </div>
            </div>
         </div>
      </div>
   </div>
</div>
{% endblock %}
