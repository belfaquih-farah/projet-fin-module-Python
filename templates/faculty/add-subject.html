{% extends 'Home/base.html' %}
{% load static %}
{% block body %}
<div class="page-wrapper">
  <div class="content container-fluid">

    <div class="page-header">
      <div class="row align-items-center">
        <div class="col">
          <h3 class="page-title">Add Subject</h3>
          <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'admin_dashboard' %}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{% url 'subject_list' %}">Subjects</a></li>
            <li class="breadcrumb-item active">Add Subject</li>
          </ul>
        </div>
      </div>
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
    </div>
    {% endfor %}
    {% endif %}

    <div class="row">
      <div class="col-sm-12">
        <div class="card">
          <div class="card-body">
            <form method="post">
              {% csrf_token %}
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group">
                    <label>Subject Name <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label>Department <span class="text-danger">*</span></label>
                    <select name="department" class="form-control" required>
                      <option value="">Select Department</option>
                      {% for dept in departments %}
                      <option value="{{ dept.pk }}">{{ dept.name }}</option>
                      {% endfor %}
                    </select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label>Teacher</label>
                    <select name="teacher" class="form-control">
                      <option value="">Select Teacher</option>
                      {% for teacher in teachers %}
                      <option value="{{ teacher.pk }}">{{ teacher.user.first_name }} {{ teacher.user.last_name }}</option>
                      {% endfor %}
                    </select>
                  </div>
                </div>
                <div class="col-md-12">
                  <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                  </div>
                </div>
              </div>
              <div class="text-right">
                <a href="{% url 'subject_list' %}" class="btn btn-secondary mr-2">Cancel</a>
                <button type="submit" class="btn btn-primary">Add Subject</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
