{% extends 'Home/base.html' %}
{% load static %}
{% block body %}
<div class="page-wrapper">
  <div class="content container-fluid">

    <div class="page-header">
      <div class="row align-items-center">
        <div class="col">
          <h3 class="page-title">Edit Exam</h3>
          <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'admin_dashboard' %}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{% url 'exam_list' %}">Exams</a></li>
            <li class="breadcrumb-item active">Edit Exam</li>
          </ul>
        </div>
      </div>
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
    </div>
    {% endfor %}
    {% endif %}

    <div class="row">
      <div class="col-sm-12">
        <div class="card">
          <div class="card-body">
            <form method="post">
              {% csrf_token %}
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group">
                    <label>Subject <span class="text-danger">*</span></label>
                    <select name="subject" class="form-control" required>
                      <option value="">Select Subject</option>
                      {% for subject in subjects %}
                      <option value="{{ subject.pk }}" {% if exam.subject.pk == subject.pk %}selected{% endif %}>
                        {{ subject.name }} ({{ subject.department }})
                      </option>
                      {% endfor %}
                    </select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label>Date <span class="text-danger">*</span></label>
                    <input type="date" name="date" class="form-control" value="{{ exam.date|date:'Y-m-d' }}" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label>Duration (minutes) <span class="text-danger">*</span></label>
                    <input type="number" name="duration" class="form-control" value="{{ exam.duration }}" min="1" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label>Room</label>
                    <input type="text" name="room" class="form-control" value="{{ exam.room }}">
                  </div>
                </div>
              </div>
              <div class="text-right">
                <a href="{% url 'exam_list' %}" class="btn btn-secondary mr-2">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Changes</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
