{% extends 'Home/base.html' %}
{% load static %}
{% block body %}
<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row align-items-center">
        <div class="col">
          <h3 class="page-title">Modifier la Note</h3>
          <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'notes_list' %}">Notes</a></li>
            <li class="breadcrumb-item active">Modifier</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h5 class="card-title mb-0">
              {{ note.student.first_name }} {{ note.student.last_name }} — {{ note.subject.name }}
            </h5>
          </div>
          <div class="card-body">
            <form method="post">
              {% csrf_token %}
              <div class="row">
                <div class="col-6">
                  <div class="form-group">
                    <label>Note <span class="text-danger">*</span></label>
                    <input type="number" name="score" class="form-control" value="{{ note.score }}" min="0" step="0.25" required>
                  </div>
                </div>
                <div class="col-6">
                  <div class="form-group">
                    <label>Note max</label>
                    <input type="number" name="max_score" class="form-control" value="{{ note.max_score }}" min="1" step="0.5">
                  </div>
                </div>
                <div class="col-12">
                  <div class="form-group">
                    <label>Commentaire</label>
                    <textarea name="comment" class="form-control" rows="3">{{ note.comment }}</textarea>
                  </div>
                </div>
              </div>
              <div class="text-right">
                <a href="{% url 'notes_list' %}" class="btn btn-secondary mr-2">Annuler</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save mr-1"></i> Sauvegarder</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
